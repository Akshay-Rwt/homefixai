<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - HomeFixAI</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="logo">🏠 HomeFix<span>AI</span></div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="chatbot.html">AI Chatbot</a></li>
            <li><a href="login.html" class="active">Login</a></li>
        </ul>
    </nav>

    <!-- AUTH FORM -->
    <div class="auth-container">
        <div class="auth-box">
            <h2>🏠 HomeFixAI</h2>
            
            <!-- TABS -->
            <div class="tabs">
                <div class="tab active" onclick="showLogin()">Login</div>
                <div class="tab" onclick="showSignup()">Sign Up</div>
            </div>

            <!-- Alert Message -->
            <div id="alertBox" style="display:none;"></div>

            <!-- LOGIN FORM -->
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" placeholder="Enter email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter password" required>
                </div>
                <button type="submit" class="submit-btn">Login</button>
            </form>

            <!-- SIGNUP FORM -->
            <form id="signupForm" style="display:none;" onsubmit="handleSignup(event)">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="signupName" placeholder="Enter name" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="signupEmail" placeholder="Enter email" required>
                </div>
                <div class="form-group">
                    <label>Phone</label>
                    <input type="tel" id="signupPhone" placeholder="Enter phone">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="signupPassword" placeholder="Create password" required>
                </div>
                <div class="form-group">
                    <label>Role</label>
                    <select id="signupRole">
                        <option value="user">Customer</option>
                        <option value="provider">Service Provider</option>
                    </select>
                </div>
                <button type="submit" class="submit-btn">Create Account</button>
            </form>
        </div>
    </div>

    <script src="js/auth.js"></script>

</body>
</html>
