<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookings - HomeFixAI</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="logo">🏠 HomeFix<span>AI</span></div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="chatbot.html">AI Chatbot</a></li>
            <li><a href="booking.html" class="active">My Bookings</a></li>
            <li><a href="login.html">Login</a></li>
        </ul>
    </nav>

    <div class="booking-container">
        <h2 class="section-title">My Bookings</h2>
        
        <!-- BOOKING FORM -->
        <div class="booking-card" id="bookingForm">
            <h3 style="margin-bottom: 20px;">📝 Book a Service</h3>
            <form onsubmit="handleBooking(event)">
                <div class="form-group">
                    <label>Select Service</label>
                    <select id="bookServiceId" required>
                        <option value="">-- Choose Service --</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Date</label>
                    <input type="date" id="bookDate" required>
                </div>
                <div class="form-group">
                    <label>Time Slot</label>
                    <select id="bookTime" required>
                        <option value="09:00 AM">09:00 AM</option>
                        <option value="11:00 AM">11:00 AM</option>
                        <option value="02:00 PM">02:00 PM</option>
                        <option value="04:00 PM">04:00 PM</option>
                        <option value="06:00 PM">06:00 PM</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Address</label>
                    <textarea id="bookAddress" placeholder="Enter your full address" rows="3" style="width:100%; padding:12px; border:2px solid #e0e0e0; border-radius:10px;" required></textarea>
                </div>
                <button type="submit" class="submit-btn">Confirm Booking ✅</button>
            </form>
        </div>

        <!-- Alert -->
        <div id="bookingAlert" style="display:none;"></div>

        <!-- BOOKINGS LIST -->
        <h3 style="margin: 30px 0 15px;">📋 Your Bookings</h3>
        <div id="bookingsList">
            <p style="color: #999; text-align: center;">Login to see your bookings</p>
        </div>
    </div>

    <script src="js/booking.js"></script>

</body>
</html>
